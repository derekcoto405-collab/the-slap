<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheSlap - Hollywood Arts</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;
        }

        body {
            background-color: #120118;
            background-image: radial-gradient(#d80073 1px, transparent 1px);
            background-size: 20px 20px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* PearPhone Shell */
        .pear-container {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, #e6007e, #800040);
            border-radius: 40px;
            padding: 20px 15px;
            box-shadow: 0 0 30px rgba(230, 0, 126, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.4);
            border: 4px solid #ff66cc;
            position: relative;
        }

        .pear-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .pear-logo {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 8px #ff007f, 2px 2px #000;
            letter-spacing: -1px;
        }

        .pear-logo span {
            color: #ffeb3b;
        }

        /* Wallpapers selector */
        .bg-picker {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .bg-btn {
            padding: 5px 10px;
            font-size: 11px;
            background: #d80073;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: bold;
        }

        .bg-btn:hover {
            background: #ff007f;
        }

        /* Screen Area */
        .screen {
            background: #0d0114;
            border-radius: 20px;
            padding: 15px;
            border: 3px solid #ff3399;
            box-shadow: inset 0 0 10px #000;
            background-size: cover;
            background-position: center;
            transition: background 0.3s;
        }

        /* Profile Header */
        .profile-card {
            background: rgba(20, 5, 30, 0.85);
            border: 2px solid #ff007f;
            border-radius: 15px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 15px;
            backdrop-filter: blur(4px);
        }

        .avatar-large {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid #ff007f;
            object-fit: cover;
            box-shadow: 0 0 10px #ff007f;
        }

        .profile-info h3 {
            color: #ffcc00;
            font-size: 18px;
            text-shadow: 1px 1px #000;
        }

        .status-badge {
            font-size: 12px;
            color: #00ffff;
            margin-top: 3px;
        }

        .follow-stats {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #ff99dd;
            margin-top: 5px;
        }

        /* Post Box */
        .post-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
            color: #333;
            border: 2px solid #ff007f;
        }

        .post-box textarea {
            width: 100%;
            height: 60px;
            border: none;
            outline: none;
            resize: none;
            font-size: 13px;
            color: #222;
        }

        .feeling-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            border-top: 1px solid #ddd;
            padding-top: 6px;
        }

        .feeling-label {
            font-size: 12px;
            font-weight: bold;
            color: #d80073;
        }

        .btn-slap {
            background: linear-gradient(#ff007f, #99004d);
            color: #fff;
            border: none;
            padding: 6px 15px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Feed Posts */
        .feed-item {
            background: rgba(15, 0, 25, 0.9);
            border: 1.5px solid #d80073;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 12px;
        }

        .feed-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #ff007f;
        }

        .feed-user {
            font-weight: bold;
            color: #ff66cc;
            font-size: 13px;
        }

        .feed-feeling {
            font-size: 11px;
            color: #00ffff;
        }

        .feed-text {
            font-size: 13px;
            line-height: 1.3;
            color: #fff;
        }

        /* Dudes / Friends Section */
        .dudes-title {
            color: #ffcc00;
            font-size: 14px;
            margin: 15px 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dudes-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .dude-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            min-width: 75px;
            border: 1px solid #ff007f;
        }

        .dude-card img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .dude-name {
            font-size: 10px;
            color: #fff;
            margin: 4px 0;
        }

        .btn-follow {
            background: #00cc66;
            color: #fff;
            border: none;
            padding: 2px 6px;
            font-size: 9px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="pear-container">
    <div class="pear-header">
        <div class="pear-logo">✋ The<span>Slap</span></div>
    </div>

    <!-- Wallpapers -->
    <div class="bg-picker">
        <button class="bg-btn" onclick="setBg('leopard')">🐆 Leopard</button>
        <button class="bg-btn" onclick="setBg('lockers')">🏫 Lockers</button>
        <button class="bg-btn" onclick="setBg('stars')">⭐ Stars</button>
        <button class="bg-btn" onclick="setBg('shine')">🌃 Shine</button>
        <button class="bg-btn" onclick="setBg('cds')">💿 CDs</button>
    </div>

    <!-- Main Screen -->
    <div class="screen" id="mainScreen">
        
        <!-- Profile Header -->
        <div class="profile-card">
            <img src="https://i.pravatar.cc/150?img=32" id="userAvatar" class="avatar-large" alt="Profile">
            <div class="profile-info">
                <h3 id="userName">Tori Vega</h3>
                <div class="status-badge">FEELING: <span id="userFeeling">😎 Feeling Awesome</span></div>
                <div class="follow-stats">
                    <span><b>142</b> Dudes</span>
                    <span><b>89</b> Following</span>
                </div>
            </div>
        </div>

        <!-- Post Box -->
        <div class="post-box">
            <textarea id="postContent" placeholder="What's on your mind?"></textarea>
            <div class="feeling-row">
                <span class="feeling-label">FEELING: 
                    <select id="feelingSelect" style="border:none; background:transparent; font-size:12px;">
                        <option>😃 Happy</option>
                        <option>😎 Cool</option>
                        <option>😭 Dramatic</option>
                        <option>😡 Annoyed</option>
                        <option>🍕 Hungry</option>
                    </select>
                </span>
                <button class="btn-slap" onclick="publishSlap()">POST!</button>
            </div>
        </div>

        <!-- Dudes (Friends to follow) -->
        <div class="dudes-title">Dudes (Friends)</div>
        <div class="dudes-list">
            <div class="dude-card">
                <img src="https://i.pravatar.cc/150?img=12">
                <div class="dude-name">Jade W.</div>
                <button class="btn-follow">Follow</button>
            </div>
            <div class="dude-card">
                <img src="https://i.pravatar.cc/150?img=47">
                <div class="dude-name">Cat V.</div>
                <button class="btn-follow">Follow</button>
            </div>
            <div class="dude-card">
                <img src="https://i.pravatar.cc/150?img=60">
                <div class="dude-name">Beck O.</div>
                <button class="btn-follow">Follow</button>
            </div>
            <div class="dude-card">
                <img src="https://i.pravatar.cc/150?img=33">
                <div class="dude-name">Robbie S.</div>
                <button class="btn-follow">Follow</button>
            </div>
        </div>

        <!-- Feed -->
        <div class="dudes-title" style="margin-top:20px;">Feed</div>
        <div id="feedContainer"></div>

    </div>
</div>

<script>
    // 1. Configura tus credenciales de Firebase aquí
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
    };

    // Inicializar Firebase (Descomentar al colocar tus datos)
    // firebase.initializeApp(firebaseConfig);
    // const db = firebase.firestore();

    // 2. Filtro de Moderación de Seguridad
    const badWords = ["tonto", "feo", "idiota", "estupido", "mierda"]; // Añade las que desees bloquear

    function filterText(text) {
        let cleanText = text;
        badWords.forEach(word => {
            const regex = new RegExp(word, "gi");
            cleanText = cleanText.replace(regex, "****");
        });
        return cleanText;
    }

    // 3. Cambiar Fondos
    function setBg(type) {
        const screen = document.getElementById('mainScreen');
        if(type === 'leopard') screen.style.backgroundImage = "url('https://i.ibb.co/3s3X5f9/leopard.jpg')";
        if(type === 'lockers') screen.style.backgroundImage = "url('https://i.ibb.co/L5hY8gW/lockers.jpg')";
        if(type === 'stars') screen.style.backgroundImage = "url('https://i.ibb.co/M9K4Zc3/stars.jpg')";
        if(type === 'shine') screen.style.backgroundImage = "url('https://i.ibb.co/0V9BvxN/shine.jpg')";
        if(type === 'cds') screen.style.backgroundImage = "url('https://i.ibb.co/x7Y3wW7/cds.jpg')";
    }

    // 4. Publicar
    function publishSlap() {
        const input = document.getElementById('postContent');
        const feeling = document.getElementById('feelingSelect').value;
        if (!input.value.trim()) return;

        const cleanMessage = filterText(input.value);

        const newPost = {
            user: "Tori Vega",
            avatar: "https://i.pravatar.cc/150?img=32",
            text: cleanMessage,
            feeling: feeling,
            time: "Just now"
        };

        renderPost(newPost);
        input.value = "";
    }

    function renderPost(post) {
        const container = document.getElementById('feedContainer');
        const html = `
            <div class="feed-item">
                <div class="feed-header">
                    <img src="${post.avatar}" class="avatar-small">
                    <div>
                        <div class="feed-user">${post.user}</div>
                        <div class="feed-feeling">FEELING: ${post.feeling}</div>
                    </div>
                </div>
                <div class="feed-text">${post.text}</div>
            </div>
        `;
        container.innerHTML = html + container.innerHTML;
    }
</script>

</body>
</html>
