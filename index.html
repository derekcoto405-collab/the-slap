<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Slap - Hollywood Arts Social</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', sans-serif;
        }

        body {
            background: #18002e;
            background-image: radial-gradient(#4d0080 15%, transparent 16%), radial-gradient(#4d0080 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }

        /* Contenedor Principal tipo Twitter */
        .app-container {
            max-width: 550px;
            width: 100%;
            background: rgba(30, 0, 55, 0.95);
            border: 3px solid #ff007f;
            border-radius: 20px;
            box-shadow: 0 0 25px #ff007f;
            overflow: hidden;
            margin-top: 10px;
        }

        /* Encabezado Y2K */
        header {
            background: linear-gradient(180deg, #ff8c00 0%, #e60073 100%);
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.5);
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            font-style: italic;
            text-shadow: 3px 3px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            letter-spacing: 2px;
            color: #fff;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #ffe600;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        /* Modal de Login / Registro */
        .login-screen {
            padding: 25px;
            background: #250042;
            text-align: center;
        }

        .login-screen h2 {
            color: #ff8c00;
            margin-bottom: 15px;
            font-style: italic;
            text-shadow: 1px 1px 0 #000;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #ff77c6;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #ff007f;
            background: #100020;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        /* Botón Estilo Burbuja Y2K */
        .btn-y2k {
            background: linear-gradient(180deg, #ffcc00 0%, #ff6600 100%);
            color: #000;
            border: 2px solid #fff;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 900;
            font-style: italic;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.8);
            text-transform: uppercase;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-y2k:active {
            transform: scale(0.98);
        }

        /* Muro Social */
        .main-content {
            display: none;
            padding: 15px;
        }

        /* Barra de Usuario Activo */
        .user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 0, 127, 0.4);
        }

        .user-bar-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-bar img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ff8c00;
            object-fit: cover;
        }

        .btn-logout {
            background: #ff0055;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }

        /* Caja de Posteo tipo Tweet */
        .tweet-box {
            background: #2a004a;
            border: 2px solid #ff007f;
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 70px;
            background: #150028;
            border: 1px solid #ff77c6;
            border-radius: 10px;
            padding: 10px;
            color: #fff;
            resize: none;
            font-size: 0.95rem;
            outline: none;
        }

        .tweet-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        select {
            background: #ff007f;
            color: #fff;
            border: 1px solid #fff;
            padding: 6px 10px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        /* Feed de Posts */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tweet-card {
            background: #21003b;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #7700b3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tweet-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #ff8c00;
            object-fit: cover;
            flex-shrink: 0;
        }

        .tweet-body {
            flex-grow: 1;
        }

        .tweet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .tweet-names {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .name {
            font-weight: bold;
            color: #fff;
            font-size: 0.95rem;
        }

        .handle {
            color: #ff77c6;
            font-size: 0.8rem;
        }

        .feeling-tag {
            background: linear-gradient(90deg, #ff007f, #ff8c00);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 4px;
            display: inline-block;
        }

        .tweet-text {
            color: #eee;
            font-size: 0.95rem;
            line-height: 1.3;
            margin: 8px 0;
        }

        .tweet-actions {
            display: flex;
            gap: 20px;
            color: #ff77c6;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .action-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .action-btn:hover {
            color: #ffe600;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">THE SLAP</div>
            <div class="subtitle">HOLLYWOOD ARTS SOCIAL</div>
        </header>

        <!-- PANTALLA DE REGISTRO / LOGIN -->
        <div id="loginScreen" class="login-screen">
            <h2>¡Crea tu perfil estilo The Slap!</h2>
            
            <div class="input-group">
                <label>Nombre Completo:</label>
                <input type="text" id="regName" placeholder="Ej: Tori Vega">
            </div>

            <div class="input-group">
                <label>Usuario (@tag):</label>
                <input type="text" id="regHandle" placeholder="Ej: @tori_vega">
            </div>

            <div class="input-group">
                <label>Correo Electrónico:</label>
                <input type="email" id="regEmail" placeholder="tori@hollywoodarts.edu">
            </div>

            <div class="input-group">
                <label>URL de Foto de Perfil (Opcional):</label>
                <input type="text" id="regAvatar" placeholder="Pegá el link de cualquier foto">
            </div>

            <button class="btn-y2k" onclick="registerUser()">¡Entrar a The Slap!</button>
        </div>

        <!-- WALL / FEED PRINCIPAL -->
        <div id="mainContent" class="main-content">
            <!-- Barra del usuario logueado -->
            <div class="user-bar">
                <div class="user-bar-info">
                    <img id="currentAvatar" src="" alt="User">
                    <div>
                        <strong id="currentName" style="display:block; font-size: 0.9rem;"></strong>
                        <span id="currentHandle" style="color: #ff77c6; font-size: 0.75rem;"></span>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">Salir</button>
            </div>

            <!-- Caja para publicar -->
            <div class="tweet-box">
                <textarea id="tweetInput" placeholder="¿Qué está pasando en Hollywood Arts?"></textarea>
                
                <div class="tweet-controls">
                    <div>
                        <span style="font-size:0.8rem; font-weight:bold; color:#ff77c6;">Feeling:</span>
                        <select id="feelingSelect">
                            <option value="😃 Happy">😃 Happy</option>
                            <option value="🎭 Drama">🎭 Drama</option>
                            <option value="🤯 Stressed">🤯 Stressed</option>
                            <option value="✨ Fabulous">✨ Fabulous</option>
                            <option value="🎤 Musical">🎤 Musical</option>
                            <option value="🖤 Annoyed">🖤 Annoyed</option>
                        </select>
                    </div>
                    <button class="btn-y2k" style="width:auto; padding: 6px 15px;" onclick="postTweet()">SLAP IT!</button>
                </div>
            </div>

            <!-- Feed de Tweets/Slaps -->
            <div class="feed" id="feed"></div>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Foto por defecto por si no ponen URL
        const defaultAvatar = "https://images.fineartamerica.com/images/artworkimages/mediumlarge/3/tori-vega-victorious-square-art-brandi-f-rodriguez.jpg";

        function registerUser() {
            const name = document.getElementById('regName').value.trim();
            let handle = document.getElementById('regHandle').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            let avatar = document.getElementById('regAvatar').value.trim();

            if (!name || !handle || !email) {
                alert('Por favor completá tu nombre, usuario y correo.');
                return;
            }

            if (!handle.startsWith('@')) handle = '@' + handle;
            if (!avatar) avatar = defaultAvatar;

            currentUser = { name, handle, email, avatar };
            localStorage.setItem('theslap_user', JSON.stringify(currentUser));

            initApp();
        }

        function logout() {
            localStorage.removeItem('theslap_user');
            location.reload();
        }

        function initApp() {
            const savedUser = JSON.parse(localStorage.getItem('theslap_user'));
            if (savedUser) {
                currentUser = savedUser;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';

                document.getElementById('currentAvatar').src = currentUser.avatar;
                document.getElementById('currentName').innerText = currentUser.name;
                document.getElementById('currentHandle').innerText = currentUser.handle;

                loadTweets();
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('mainContent').style.display = 'none';
            }
        }

        function playSlapSound() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance("The Slap!");
                utterance.pitch = 1.4;
                utterance.rate = 1.1;
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }

        function postTweet() {
            const text = document.getElementById('tweetInput').value.trim();
            const feeling = document.getElementById('feelingSelect').value;

            if (!text) {
                alert('Escribí algo antes de publicar.');
                return;
            }

            playSlapSound();

            const newTweet = {
                id: Date.now(),
                name: currentUser.name,
                handle: currentUser.handle,
                avatar: currentUser.avatar,
                text: text,
                feeling: feeling,
                likes: 0,
                time: "Ahora mismo"
            };

            const tweets = JSON.parse(localStorage.getItem('theslap_tweets')) || [];
            tweets.unshift(newTweet);
            localStorage.setItem('theslap_tweets', JSON.stringify(tweets));

            document.getElementById('tweetInput').value = '';
            loadTweets();
        }

        function loadTweets() {
            const feed = document.getElementById('feed');
            const tweets = JSON.parse(localStorage.getItem('theslap_tweets')) || [
                {
                    id: 1,
                    name: "Jade West",
                    handle: "@jade_west",
                    avatar: "https://i.pinimg.com/736x/87/40/e3/8740e340a656a84f33b1e32d1844b245.jpg",
                    text: "Si alguien vuelve a tocar mi tijera se las va a ver conmigo. Advertidos quedan. ✂️",
                    feeling: "🖤 Annoyed",
                    likes: 12,
                    time: "Hace 10 min"
                }
            ];

            feed.innerHTML = '';
            tweets.forEach(t => {
                const card = document.createElement('div');
                card.className = 'tweet-card';
                card.innerHTML = `
                    <img src="${t.avatar}" class="tweet-avatar" onerror="this.src='${defaultAvatar}'">
                    <div class="tweet-body">
                        <div class="tweet-header">
                            <div class="tweet-names">
                                <span class="name">${t.name}</span>
                                <span class="handle">${t.handle}</span>
                            </div>
                        </div>
                        <span class="feeling-tag">Feeling: ${t.feeling}</span>
                        <div class="tweet-text">${t.text}</div>
                        <div class="tweet-actions">
                            <span class="action-btn" onclick="likeTweet(${t.id})">👋 Slap (${t.likes})</span>
                            <span class="action-btn">💬 Comentar</span>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        function likeTweet(id) {
            const tweets = JSON.parse(localStorage.getItem('theslap_tweets')) || [];
            const tweet = tweets.find(t => t.id === id);
            if (tweet) {
                tweet.likes += 1;
                localStorage.setItem('theslap_tweets', JSON.stringify(tweets));
                loadTweets();
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
